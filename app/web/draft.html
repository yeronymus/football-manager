<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драфт (Draft)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --team-a-color: #e53935;
            --team-b-color: #1e88e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .columns-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex-grow: 1;
            padding-bottom: 10px;
        }

        .column {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            min-width: 250px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            padding: 5px;
            border-radius: 6px;
            cursor: pointer;
            /* Clickable now */
        }

        .column-header:active {
            opacity: 0.8;
        }

        .col-unassigned .column-header {
            background-color: #444;
        }

        .col-a .column-header {
            background-color: var(--team-a-color);
        }

        .col-b .column-header {
            background-color: var(--team-b-color);
        }

        .player-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            min-height: 100px;
        }

        .player-card {
            background-color: #3d3d3d;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s, border 0.1s, background 0.1s;
        }

        .player-card:active {
            transform: scale(0.98);
        }

        .player-rating {
            font-size: 12px;
            color: #aaa;
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stats-panel {
            margin-top: 10px;
            padding: 10px;
            background: #252525;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .controls {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-balance {
            background-color: #FF9800;
            color: white;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-publish {
            background-color: #2196F3;
            color: white;
            grid-column: span 2;
        }
    </style>
</head>

<body>
    <h1 id="gameTitle">Загрузка...</h1>

    <div class="columns-container">
        <div class="column col-unassigned">
            <div class="column-header">Нераспределенные</div>
            <div class="player-list" id="list-unassigned" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Players will answer here -->
            </div>
        </div>

        <div class="column col-a">
            <div class="column-header">Команда А <span id="rating-a"></span></div>
            <div class="player-list" id="list-a" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

        <div class="column col-b">
            <div class="column-header">Команда Б <span id="rating-b"></span></div>
            <div class="player-list" id="list-b" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
    </div>

    <div class="stats-panel">
        <span>Разница MMR: <b id="diff-mmr">0</b></span>
        <span>Игроков: <b id="count-total">0</b></span>
    </div>

    <div class="controls">
        <button class="btn-balance" onclick="autoBalance()">⚖️ Авто-баланс</button>
        <button class="btn-save" onclick="saveTeams()">💾 Сохранить</button>
        <button class="btn-publish" onclick="publishTeams()">✅ Опубликовать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Parse Query Params
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game_id');

        let allPlayers = {}; // id -> {name, rating, team}

        async function loadGame() {
            try {
                const response = await fetch(`/api/game/${gameId}?initData=${encodeURIComponent(tg.initData)}`);
                if (!response.ok) throw new Error("Load failed");
                const game = await response.json();

                document.getElementById('gameTitle').textContent = `Драфт: ${game.location}`;

                // Clear lists
                document.getElementById('list-unassigned').innerHTML = '';
                document.getElementById('list-a').innerHTML = '';
                document.getElementById('list-b').innerHTML = '';
                allPlayers = {};

                // Render lists
                game.unassigned.forEach(p => addPlayer(p, 'list-unassigned'));
                game.team_a.forEach(p => addPlayer(p, 'list-a'));
                game.team_b.forEach(p => addPlayer(p, 'list-b'));

                updateStats();
            } catch (e) {
                tg.showAlert("Ошибка загрузки: " + e.message);
            }
        }

        function addPlayer(player, listId) {
            allPlayers[player.id] = player;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `player-${player.id}`;
            div.draggable = true;
            div.innerHTML = `
                <span>${player.name}</span>
                <span class="player-rating">${player.rating || 1200}</span>
            `;

            // Mobile-friendly "Select & Swap" Logic
            div.onclick = function (e) {
                e.preventDefault();
                handlePlayerClick(player.id);
            };

            // Drag Logic
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData("text/plain", player.id);
                selectPlayer(player.id); // Also select on drag
            });

            document.getElementById(listId).appendChild(div);
        }

        // --- Drag & Drop ---
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drop(ev) {
            ev.preventDefault();
            const playerId = ev.dataTransfer.getData("text/plain");
            const playerCard = document.getElementById(`player-${playerId}`);
            // Find closest list
            let targetList = ev.target.closest('.player-list');
            if (targetList) {
                targetList.appendChild(playerCard);
                updateStats();
                deselectPlayer(); // Clear selection after drop
            }
        }

        // --- Select & Swap Logic ---
        let selectedPlayerId = null;

        function handlePlayerClick(id) {
            if (selectedPlayerId === id) {
                deselectPlayer();
            } else {
                if (selectedPlayerId) {
                    // Start Swap
                    swapPlayers(selectedPlayerId, id);
                    deselectPlayer();
                } else {
                    // Select
                    selectPlayer(id);
                }
            }
        }

        function selectPlayer(id) {
            if (selectedPlayerId) {
                const prev = document.getElementById(`player-${selectedPlayerId}`);
                if (prev) {
                    prev.style.border = 'none';
                    prev.style.background = '#3d3d3d';
                }
            }
            selectedPlayerId = id;
            const el = document.getElementById(`player-${id}`);
            if (el) {
                el.style.border = '2px solid #FFEB3B';
                el.style.background = '#555';
            }
        }

        function deselectPlayer() {
            if (selectedPlayerId) {
                const el = document.getElementById(`player-${selectedPlayerId}`);
                if (el) {
                    el.style.border = 'none';
                    el.style.background = '#3d3d3d';
                }
            }
            selectedPlayerId = null;
        }

        function swapPlayers(id1, id2) {
            const card1 = document.getElementById(`player-${id1}`);
            const card2 = document.getElementById(`player-${id2}`);

            if (!card1 || !card2) return;

            const parent1 = card1.parentNode;
            const parent2 = card2.parentNode;
            const next1 = card1.nextSibling;
            const next2 = card2.nextSibling;

            // Need to be careful moving elements
            parent1.insertBefore(card2, next1);
            parent2.insertBefore(card1, next2);

            updateStats();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function setupColumnClicks() {
            document.querySelector('.col-unassigned .column-header').onclick = () => moveSelectedTo('list-unassigned');
            document.querySelector('.col-a .column-header').onclick = () => moveSelectedTo('list-a');
            document.querySelector('.col-b .column-header').onclick = () => moveSelectedTo('list-b');
        }

        function moveSelectedTo(listId) {
            if (!selectedPlayerId) return;
            const card = document.getElementById(`player-${selectedPlayerId}`);
            if (card && card.parentNode.id !== listId) {
                document.getElementById(listId).appendChild(card);
                updateStats();
                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
            }
            deselectPlayer();
        }

        // --- Stats & Actions ---

        function updateStats() {
            let sumA = 0, countA = 0;
            let sumB = 0, countB = 0;
            let total = 0;

            // Scan DOM to get current state
            document.querySelectorAll('#list-a .player-card').forEach(el => {
                const id = el.id.replace('player-', '');
                const p = allPlayers[id];
                if (p) {
                    sumA += (p.rating || 1200);
                    countA++;
                    total++;
                }
            });

            document.querySelectorAll('#list-b .player-card').forEach(el => {
                const id = el.id.replace('player-', '');
                const p = allPlayers[id];
                if (p) {
                    sumB += (p.rating || 1200);
                    countB++;
                    total++;
                }
            });

            document.querySelectorAll('#list-unassigned .player-card').forEach(el => total++);

            const avgA = countA ? Math.round(sumA / countA) : 0;
            const avgB = countB ? Math.round(sumB / countB) : 0;

            document.getElementById('rating-a').textContent = `(Avg: ${avgA})`;
            document.getElementById('rating-b').textContent = `(Avg: ${avgB})`;

            document.getElementById('diff-mmr').textContent = Math.abs(sumA - sumB);
            document.getElementById('count-total').textContent = total;
        }

        async function autoBalance() {
            if (!confirm("Перемешать команды автоматически?")) return;
            try {
                await fetch('/api/balance_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tg.initData,
                        game_id: parseInt(gameId)
                    })
                });
                await loadGame(); // Reload state
                tg.showAlert("Команды сбалансированы!");
            } catch (e) {
                tg.showAlert("Ошибка: " + e.message);
            }
        }

        async function saveTeams() {
            const teamA = [];
            const teamB = [];

            document.querySelectorAll('#list-a .player-card').forEach(el => {
                teamA.push(parseInt(el.id.replace('player-', '')));
            });
            document.querySelectorAll('#list-b .player-card').forEach(el => {
                teamB.push(parseInt(el.id.replace('player-', '')));
            });

            try {
                await fetch('/api/update_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tg.initData,
                        game_id: parseInt(gameId),
                        team_a: teamA,
                        team_b: teamB
                    })
                });
                tg.showAlert("Сохранено!");
                updateStats();
            } catch (e) {
                tg.showAlert("Ошибка сохранения");
            }
        }

        async function publishTeams() {
            if (!confirm("Опубликовать составы в канал? Игра станет АКИТВНОЙ.")) return;
            await saveTeams();
            try {
                await fetch('/api/publish_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tg.initData,
                        game_id: parseInt(gameId)
                    })
                });
                tg.showAlert("Опубликовано! Можно закрывать.");
                tg.close();
            } catch (e) {
                tg.showAlert("Ошибка публикации: " + e.message);
            }
        }

        // Init
        setupColumnClicks();
        if (!gameId) {
            document.body.innerHTML = "<h2>Ошибка: Game ID не найден</h2>";
        } else {
            loadGame();
        }
    </script>
</body>

</html>
