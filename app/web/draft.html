<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Драфт (Draft)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --team-a-color: #e53935;
            --team-b-color: #1e88e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 16px;
            margin-top: 0;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .gk-toggle {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* Layout Container */
        .game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        /* 2-Column Grid for Teams */
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-grow: 1;
            overflow: hidden;
        }

        .column {
            background-color: var(--card-bg);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #444;
        }

        .column-header {
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            padding: 6px 4px;
            cursor: pointer;
        }

        .col-a .column-header {
            background-color: var(--team-a-color);
        }

        .col-b .column-header {
            background-color: var(--team-b-color);
        }

        /* Tactic Sections */
        .tactic-board {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .pos-group {
            border-bottom: 1px solid #444;
            min-height: 40px;
            display: flex;
            flex-direction: column;
        }

        .pos-group.hidden {
            display: none;
        }

        .pos-header {
            font-size: 10px;
            color: #888;
            padding: 2px 4px;
            background: rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
        }

        .player-list {
            flex-grow: 1;
            padding: 2px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Unassigned Drawer */
        .unassigned-section {
            background-color: #333;
            border-radius: 8px;
            padding: 6px;
            max-height: 12vh;
            display: flex;
            flex-direction: column;
        }

        .unassigned-header {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
            text-align: center;
        }

        .unassigned-list {
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .player-card {
            background-color: #3d3d3d;
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border: 1px solid transparent;
            width: 100%;
            box-sizing: border-box;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 4px;
            overflow: hidden;
        }

        .player-pos {
            font-size: 9px;
            font-weight: bold;
            padding: 1px 2px;
            border-radius: 3px;
            background: #555;
            min-width: 18px;
            text-align: center;
        }

        .pos-GK {
            background: #FF9800;
            color: #000;
        }

        .pos-DEF {
            background: #2196F3;
        }

        .pos-MID {
            background: #4CAF50;
        }

        .pos-FWD {
            background: #f44336;
        }

        .player-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .player-rating {
            font-size: 10px;
            color: #aaa;
            background: #222;
            padding: 1px 3px;
            border-radius: 3px;
        }

        /* Selection highlight */
        .selected {
            border: 1px solid #FFEB3B;
            background: #505050;
        }

        .stats-panel {
            padding: 8px;
            background: #252525;
            border-radius: 8px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            /* Push to bottom if space allows */
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding-top: 4px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-balance {
            background-color: #FF9800;
            color: white;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-publish {
            background-color: #2196F3;
            color: white;
            grid-column: span 2;
        }

        /* Game Selector Modal */
        #gameSelector {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            display: none;
        }

        .game-option {
            background: #333;
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Game Selector Overlay -->
    <div id="gameSelector">
        <h2>Выберите игру</h2>
        <div id="gameList"></div>
    </div>

    <div class="top-bar">
        <div style="display:flex; gap:10px;">
            <label class="gk-toggle">
                <input type="checkbox" id="chk-gk-a" onchange="toggleGK('a')" checked> GK A
            </label>
            <label class="gk-toggle">
                <input type="checkbox" id="chk-gk-b" onchange="toggleGK('b')" checked> GK B
            </label>
        </div>
        <span id="gameTitle" style="font-weight: bold; font-size:14px;">...</span>
    </div>

    <div class="game-container">
        <!-- Unassigned -->
        <div class="unassigned-section">
            <div class="unassigned-header">Нераспределенные</div>
            <div class="unassigned-list" id="list-unassigned" onclick="handleListClick(event, 'list-unassigned')"></div>
        </div>

        <!-- Teams -->
        <div class="teams-grid">
            <!-- Team A -->
            <div class="column col-a">
                <div class="column-header" onclick="moveSelectedToTeam('A')">Команда А <span id="rating-a"></span></div>
                <div class="tactic-board">
                    <div class="pos-group group-GK" id="a-GK" onclick="moveSelectedToSlot('a-GK', 'GK')">
                        <div class="pos-header">GK</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="a-DEF" onclick="moveSelectedToSlot('a-DEF', 'DEF')">
                        <div class="pos-header">Защита (3)</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="a-MID" onclick="moveSelectedToSlot('a-MID', 'MID')">
                        <div class="pos-header">Полузащита (3)</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="a-FWD" onclick="moveSelectedToSlot('a-FWD', 'FWD')">
                        <div class="pos-header">Нападение (2)</div>
                        <div class="player-list"></div>
                    </div>
                </div>
            </div>

            <!-- Team B -->
            <div class="column col-b">
                <div class="column-header" onclick="moveSelectedToTeam('B')">Команда Б <span id="rating-b"></span></div>
                <div class="tactic-board">
                    <div class="pos-group group-GK" id="b-GK" onclick="moveSelectedToSlot('b-GK', 'GK')">
                        <div class="pos-header">GK</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="b-DEF" onclick="moveSelectedToSlot('b-DEF', 'DEF')">
                        <div class="pos-header">Защита (3)</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="b-MID" onclick="moveSelectedToSlot('b-MID', 'MID')">
                        <div class="pos-header">Полузащита (3)</div>
                        <div class="player-list"></div>
                    </div>
                    <div class="pos-group" id="b-FWD" onclick="moveSelectedToSlot('b-FWD', 'FWD')">
                        <div class="pos-header">Нападение (2)</div>
                        <div class="player-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-panel">
        <span>Разница: <b id="diff-mmr">0</b></span>
        <span>Игроки: <b id="count-total">0</b></span>
    </div>

    <div class="controls">
        <button class="btn-balance" onclick="autoBalance()">⚖️ Баланс</button>
        <button class="btn-save" onclick="saveTeams()">💾 Сохранить</button>
        <button class="btn-publish" onclick="publishTeams()">✅ Опубликовать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let gameId = urlParams.get('game_id');
        let allPlayers = {};
        let selectedPlayerId = null;

        // --- Init ---
        if (!gameId) {
            showGameSelector();
        } else {
            loadGame(gameId);
        }

        function toggleGK(team) {
            // If team is provided, toggle only that team. If not (init), toggle both based on their checkboxes.
            if (team) {
                const show = document.getElementById(`chk-gk-${team}`).checked;
                const el = document.getElementById(`${team}-GK`);
                if (el) el.style.display = show ? 'flex' : 'none';
            } else {
                // Init both
                toggleGK('a');
                toggleGK('b');
            }
        }

        async function showGameSelector() {
            document.getElementById('gameSelector').style.display = 'flex';
            document.getElementById('gameTitle').innerText = "";
            try {
                const response = await fetch(`/api/games/open?initData=${encodeURIComponent(tg.initData)}`);
                if (!response.ok) throw new Error("API Error");
                const games = await response.json();
                const list = document.getElementById('gameList');
                list.innerHTML = '';
                if (games.length === 0) {
                    list.innerHTML = '<div style="color:#aaa">Нет активных игр</div>';
                    return;
                }
                games.forEach(g => {
                    const btn = document.createElement('div');
                    btn.className = 'game-option';
                    const d = new Date(g.date_time);
                    btn.innerHTML = `${g.location} (${d.getDate()}.${d.getMonth() + 1})`;
                    btn.onclick = () => {
                        gameId = g.id;
                        document.getElementById('gameSelector').style.display = 'none';
                        loadGame(gameId);
                    };
                    list.appendChild(btn);
                });
            } catch (e) { tg.showAlert("Ошибка: " + e.message); }
        }

        async function loadGame(id) {
            try {
                const response = await fetch(`/api/game/${id}?initData=${encodeURIComponent(tg.initData)}`);
                if (!response.ok) throw new Error("Load failed");
                const game = await response.json();

                document.getElementById('gameTitle').innerText = game.location;
                allPlayers = {};

                // Set GK Toggles
                document.getElementById('chk-gk-a').checked = game.has_active_gk_a !== false; // Default true
                document.getElementById('chk-gk-b').checked = game.has_active_gk_b !== false;
                toggleGK(); // Apply vis

                // Clear
                document.getElementById('list-unassigned').innerHTML = '';
                ['a', 'b'].forEach(team => {
                    ['GK', 'DEF', 'MID', 'FWD'].forEach(pos => {
                        document.querySelector(`#${team}-${pos} .player-list`).innerHTML = '';
                    });
                });

                // Helper to add
                const addToTeam = (p, teamPrefix) => {
                    allPlayers[p.id] = p;
                    // Sort into slot
                    const pos = p.position || 'DEF';
                    const slotId = `${teamPrefix}-${pos}`;
                    addPlayerToSlot(p, slotId);
                };

                game.unassigned.forEach(p => {
                    allPlayers[p.id] = p;
                    addPlayerToSlot(p, 'list-unassigned');
                });
                game.team_a.forEach(p => addToTeam(p, 'a'));
                game.team_b.forEach(p => addToTeam(p, 'b'));

                updateStats();
            } catch (e) { tg.showAlert("Ошибка: " + e.message); }
        }

        // ... existing createCard ...

        async function autoBalance() {
            if (!confirm("Авто-баланс сбросит расстановку. Продолжить?")) return;
            try {
                // Ensure flags are current
                await saveTeams();

                await fetch('/api/balance_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, game_id: parseInt(gameId) })
                });
                await loadGame(gameId);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } catch (e) { tg.showAlert("Ошибка: " + e.message); }
        }

        async function saveTeams() {
            // Gather IDs from slots
            const teamA = [];
            const teamB = [];

            const gather = (prefix, list) => {
                ['GK', 'DEF', 'MID', 'FWD'].forEach(pos => {
                    const slot = document.getElementById(`${prefix}-${pos}`);
                    if (!slot) return;
                    slot.querySelectorAll('.player-card').forEach(card => {
                        list.push(parseInt(card.id.replace('player-', '')));
                    });
                });
            };

            gather('a', teamA);
            gather('b', teamB);

            const gkA = document.getElementById('chk-gk-a').checked;
            const gkB = document.getElementById('chk-gk-b').checked;

            try {
                await fetch('/api/update_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tg.initData,
                        game_id: parseInt(gameId),
                        team_a: teamA,
                        team_b: teamB,
                        has_active_gk_a: gkA,
                        has_active_gk_b: gkB
                    })
                });
                // SILENT SAVE
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                const btn = document.querySelector('.btn-save');
                const old = btn.innerText;
                btn.innerText = "OK!";
                setTimeout(() => btn.innerText = old, 1000);
            } catch (e) { tg.showAlert("Ошибка: " + e.message); }
        }

        async function publishTeams() {
            if (!confirm("Опубликовать составы?")) return;
            await saveTeams(); // Save first to ensure state
            try {
                await fetch('/api/publish_teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData, game_id: parseInt(gameId) })
                });
                tg.showAlert("Опубликовано!");
                tg.close();
            } catch (e) { tg.showAlert("Ошибка: " + e.message); }
        }
    </script>
</body>

</html>
