<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 12px;
        }

        .team-score {
            text-align: center;
            width: 45%;
        }

        .team-score input {
            width: 60px;
            font-size: 32px;
            text-align: center;
            border: 2px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }

        .vs {
            font-weight: bold;
            font-size: 20px;
            color: var(--tg-theme-hint-color, #999);
        }

        .players-list {
            margin-bottom: 20px;
        }

        .team-header {
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        .player-name {
            flex-grow: 1;
        }

        .goal-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .goal-count {
            font-weight: bold;
            width: 20px;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
        }

        /* Selector Styles */
        #gameSelector {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--tg-theme-bg-color, #fff);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #gameList {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .game-card:hover {
            border-color: var(--tg-theme-button-color, #3390ec);
        }
    </style>
</head>

<body>
    <div id="gameSelector">
        <h2 style="margin-bottom:20px;">Выберите матч</h2>
        <div id="gameList"></div>
    </div>

    <div class="container" id="app">
        <div class="loading">Loading game details...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Robust initData retrieval (handle iframe case)
        const urlParams = new URLSearchParams(window.location.search);
        const urlInitData = urlParams.get('initData');
        const initData = tg.initData || urlInitData || "";
        
        if (!tg.initData && urlInitData) {
            console.log("Using initData from URL params");
        }
        tg.expand();

        // Parse URL params
        let gameId = urlParams.get('id') || urlParams.get('game_id');

        const app = document.getElementById('app');
        const selector = document.getElementById('gameSelector');
        const list = document.getElementById('gameList');

        let gameData = null;
        let playerGoals = {};

        // --- Game Selector Logic ---
        async function showGameSelector() {
            app.style.display = 'none';
            selector.style.display = 'flex';
            list.innerHTML = '<div class="loading">Загрузка матчей...</div>';

            try {
                const response = await fetch(`/api/games/open?initData=${encodeURIComponent(tg.initData)}`, {
                    headers: { 'Authorization': `tma ${tg.initData}` }
                });
                if (!response.ok) throw new Error("Failed to fetch games");
                const games = await response.json();

                list.innerHTML = '';
                if (games.length === 0) {
                    list.innerHTML = '<div style="color:var(--tg-theme-hint-color); text-align:center;">Нет активных матчей.</div>';
                    return;
                }

                games.forEach(g => {
                    const btn = document.createElement('div');
                    btn.className = 'game-card';

                    const d = new Date(g.date_time);
                    const dateStr = `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth() + 1).toString().padStart(2, '0')} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;

                    btn.innerHTML = `<b>${g.location}</b><br><span style="font-size:14px; color:var(--tg-theme-hint-color);">${dateStr}</span>`;

                    btn.onclick = () => {
                        gameId = g.id;
                        selector.style.display = 'none';
                        app.style.display = 'block';
                        fetchGameDetails();
                    };
                    list.appendChild(btn);
                });
            } catch (e) {
                tg.showAlert("Error: " + e.message);
            }
        }

        async function fetchGameDetails() {
            if (!gameId) {
                showGameSelector();
                return;
            }

            app.innerHTML = '<div class="loading">Loading game details...</div>';

            try {
                const response = await fetch(`/api/game/${gameId}?initData=${encodeURIComponent(initData)}`, {
                    headers: { 'Authorization': `tma ${initData}` }
                });
                if (!response.ok) throw new Error('Failed to load game');
                gameData = await response.json();
                render();
            } catch (e) {
                app.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
            }
        }

        function updateGoal(userId, delta, team) {
            if (!playerGoals[userId]) playerGoals[userId] = 0;
            playerGoals[userId] = Math.max(0, playerGoals[userId] + delta);
            document.getElementById(`goals-${userId}`).innerText = playerGoals[userId];

            // Auto-update team score
            calculateTeamScore(team);
        }

        function calculateTeamScore(team) {
            let total = 0;
            const players = team === 'A' ? gameData.team_a : gameData.team_b;
            players.forEach(p => {
                total += (playerGoals[p.id] || 0);
            });

            const scoreInput = document.getElementById(team === 'A' ? 'score-a' : 'score-b');
            scoreInput.value = total;
        }

        async function submitResult() {
            const btn = document.querySelector('.submit-btn');
            if (btn) {
                btn.disabled = true;
                btn.innerText = "⏳ Сохранение...";
            }

            const scoreA = parseInt(document.getElementById('score-a').value) || 0;
            const scoreB = parseInt(document.getElementById('score-b').value) || 0;

            let winner = null;
            if (scoreA > scoreB) winner = "A";
            if (scoreB > scoreA) winner = "B";

            // Get MVPs
            const mvpA = document.getElementById('mvp-team-a').value;
            const mvpB = document.getElementById('mvp-team-b').value;

            const playerStats = Object.entries(playerGoals).map(([uid, goals]) => ({
                user_id: parseInt(uid),
                goals: goals
            }));

            const payload = {
                game_id: parseInt(gameId),
                score_a: scoreA,
                score_b: scoreB,
                winner_team: winner,
                mvp_team_a: mvpA ? parseInt(mvpA) : null,
                mvp_team_b: mvpB ? parseInt(mvpB) : null,
                player_stats: playerStats,
                initData: initData
            };

            try {
                const response = await fetch('/api/admin/finish_game', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `tma ${initData}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    tg.showAlert("Матч завершен!");
                    tg.close();
                } else {
                    const err = await response.json();
                    tg.showAlert(`Error: ${err.detail || "Unknown error"}`);
                    if (btn) {
                        btn.disabled = false;
                        btn.innerText = "Завершить матч";
                    }
                }
            } catch (e) {
                tg.showAlert(`Network Error: ${e.message}`);
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = "Завершить матч";
                }
            }
        }

        function render() {
            if (!gameData) return;

            let html = `
                <h1>${gameData.location}</h1>
                <div class="score-board">
                    <div class="team-score">
                        <h3>🟠 Orange</h3>
                        <input type="number" id="score-a" value="${gameData.score_a || 0}" min="0">
                    </div>
                    <div class="vs">:</div>
                    <div class="team-score">
                        <h3>🟢 Green</h3>
                        <input type="number" id="score-b" value="${gameData.score_b || 0}" min="0">
                    </div>
                </div>
            `;

            html += `<div class="players-list">`;

            // Team A
            html += `<div class="team-header">🟠 Игроки (Orange)</div>`;
            gameData.team_a.forEach(p => {
                html += `
                    <div class="player-row">
                        <div class="player-name" style="color:#ff9800; font-weight:600;">${p.name}</div>
                        <div class="goal-controls">
                            <button class="btn-circle" onclick="updateGoal(${p.id}, -1, 'A')">-</button>
                            <span class="goal-count" id="goals-${p.id}">0</span>
                            <button class="btn-circle" onclick="updateGoal(${p.id}, 1, 'A')">+</button>
                        </div>
                    </div>
                `;
            });
 
            // Team B
            html += `<div class="team-header" style="margin-top: 20px;">🟢 Игроки (Green)</div>`;
            gameData.team_b.forEach(p => {
                html += `
                    <div class="player-row">
                        <div class="player-name" style="color:#4caf50; font-weight:600;">${p.name}</div>
                        <div class="goal-controls">
                            <button class="btn-circle" onclick="updateGoal(${p.id}, -1, 'B')">-</button>
                            <span class="goal-count" id="goals-${p.id}">0</span>
                            <button class="btn-circle" onclick="updateGoal(${p.id}, 1, 'B')">+</button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            // MVP Selection Dropdown
            html += `
                <div style="background:var(--tg-theme-secondary-bg-color, #f5f5f5); padding:15px; border-radius:12px; margin-bottom:20px;">
                    <h3 style="margin-top:0; margin-bottom:10px;">⭐ Результаты голосования</h3>
                    <div id="voting-preview" style="font-size:14px; color:var(--tg-theme-hint-color); margin-bottom:15px;">Загрузка голосов...</div>
                    
                    <h3 style="margin-top:20px; margin-bottom:10px;">🏆 Выберите MVP (итоговых)</h3>
                    
                    <div style="margin-bottom: 10px;">
                        <label>🟠 MVP (Orange):</label>
                        <select id="mvp-team-a" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px;">
                            <option value="">-- Никто --</option>
            `;

            gameData.team_a.forEach(p => {
                html += `<option value="${p.id}">${p.name}</option>`;
            });

            html += `
                        </select>
                    </div>

                    <div>
                        <label>🟢 MVP (Green):</label>
                        <select id="mvp-team-b" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px;">
                            <option value="">-- Никто --</option>
            `;

            gameData.team_b.forEach(p => {
                html += `<option value="${p.id}">${p.name}</option>`;
            });

            html += `
                        </select>
                    </div>
                </div>
            `;

            html += `<button class="submit-btn" onclick="submitResult()">Завершить матч</button>`;

            app.innerHTML = html;
            fetchVotes();
        }

        async function fetchVotes() {
            try {
                const response = await fetch(`/api/dashboard/games/${gameId}/votes/summary`, {
                    headers: { 'Authorization': `tma ${initData}` }
                });
                if (response.ok) {
                    const votes = await response.json();
                    const preview = document.getElementById('voting-preview');
                    if (votes.length === 0) {
                        preview.innerText = "Голосов пока нет.";
                        return;
                    }
                    let voteHtml = '<ul style="margin:0; padding-left:20px;">';
                    votes.slice(0, 5).forEach(v => {
                        voteHtml += `<li>${v.name}: <b>${v.count}</b> ⭐</li>`;
                    });
                    voteHtml += '</ul>';
                    preview.innerHTML = voteHtml;
                }
            } catch (e) {
                console.error("Failed to fetch votes", e);
            }
        }

        fetchGameDetails();
    </script>
</body>

</html>
