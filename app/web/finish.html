<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finish Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            padding: 20px;
            border-radius: 12px;
        }

        .team-score {
            text-align: center;
            width: 45%;
        }

        .team-score input {
            width: 60px;
            font-size: 32px;
            text-align: center;
            border: 2px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }

        .vs {
            font-weight: bold;
            font-size: 20px;
            color: var(--tg-theme-hint-color, #999);
        }

        .players-list {
            margin-bottom: 20px;
        }

        .team-header {
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        .player-name {
            flex-grow: 1;
        }

        .goal-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .goal-count {
            font-weight: bold;
            width: 20px;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
        }
    </style>
</head>

<body>
    <div class="container" id="app">
        <div class="loading">Loading game details...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        const app = document.getElementById('app');
        let gameData = null;
        let playerGoals = {};

        async function fetchGameDetails() {
            if (!gameId) {
                app.innerHTML = '<div class="loading">No game ID provided.</div>';
                return;
            }

            try {
                const response = await fetch(`/api/game/${gameId}?initData=${encodeURIComponent(tg.initData)}`);
                if (!response.ok) throw new Error('Failed to load game');
                gameData = await response.json();
                render();
            } catch (e) {
                app.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
            }
        }

        function updateGoal(userId, delta) {
            if (!playerGoals[userId]) playerGoals[userId] = 0;
            playerGoals[userId] = Math.max(0, playerGoals[userId] + delta);
            document.getElementById(`goals-${userId}`).innerText = playerGoals[userId];

            // Auto-update score? Maybe not, let admin set score manually to account for own goals etc.
        }

        async function submitResult() {
            const scoreA = parseInt(document.getElementById('score-a').value) || 0;
            const scoreB = parseInt(document.getElementById('score-b').value) || 0;

            let winner = null;
            if (scoreA > scoreB) winner = "A";
            if (scoreB > scoreA) winner = "B";

            const playerStats = Object.entries(playerGoals).map(([uid, goals]) => ({
                user_id: parseInt(uid),
                goals: goals
            }));

            const payload = {
                game_id: parseInt(gameId),
                score_a: scoreA,
                score_b: scoreB,
                winner_team: winner,
                player_stats: playerStats,
                initData: tg.initData
            };

            try {
                const response = await fetch('/api/finish_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    tg.showAlert("Game finished successfully!", () => {
                        tg.close();
                    });
                } else {
                    const err = await response.json();
                    tg.showAlert(`Error: ${err.detail}`);
                }
            } catch (e) {
                tg.showAlert(`Network Error: ${e.message}`);
            }
        }

        function render() {
            if (!gameData) return;

            let html = `
                <h1>${gameData.location}</h1>
                <div class="score-board">
                    <div class="team-score">
                        <h3>Team A</h3>
                        <input type="number" id="score-a" value="${gameData.score_a || 0}" min="0">
                    </div>
                    <div class="vs">:</div>
                    <div class="team-score">
                        <h3>Team B</h3>
                        <input type="number" id="score-b" value="${gameData.score_b || 0}" min="0">
                    </div>
                </div>
            `;

            html += `<div class="players-list">`;

            // Team A
            html += `<div class="team-header">Team A Players</div>`;
            gameData.team_a.forEach(p => {
                html += `
                    <div class="player-row">
                        <div class="player-name">${p.name}</div>
                        <div class="goal-controls">
                            <button class="btn-circle" onclick="updateGoal(${p.id}, -1)">-</button>
                            <span class="goal-count" id="goals-${p.id}">0</span>
                            <button class="btn-circle" onclick="updateGoal(${p.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            // Team B
            html += `<div class="team-header" style="margin-top: 20px;">Team B Players</div>`;
            gameData.team_b.forEach(p => {
                html += `
                    <div class="player-row">
                        <div class="player-name">${p.name}</div>
                        <div class="goal-controls">
                            <button class="btn-circle" onclick="updateGoal(${p.id}, -1)">-</button>
                            <span class="goal-count" id="goals-${p.id}">0</span>
                            <button class="btn-circle" onclick="updateGoal(${p.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            html += `<button class="submit-btn" onclick="submitResult()">Finish Match</button>`;

            app.innerHTML = html;
        }

        fetchGameDetails();
    </script>
</body>

</html>
