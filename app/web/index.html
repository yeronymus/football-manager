<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/cs.js"></script>
    <style>
        body {
            font-family: var(--tg-theme-font-family, sans-serif);
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:disabled {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <h1>Создать игру</h1>
    <div class="form-group">
        <label for="chat_id">Чат</label>
        <select id="chat_id">
            <option value="" disabled selected>Выберите чат</option>
            <!-- Options will be populated via JS or hardcoded for MVP -->
            <!-- For MVP, user enters Chat ID manually or we fetch from API if possible -->
            <!-- Since we don't have an endpoint to list chats yet, let's use a text input for ID or hardcode -->
        </select>
    </div>
    <div class="form-group">
        <label for="date_time">Дата и Время</label>
        <input type="text" id="date_time" placeholder="Выберите дату и время" required>
    </div>
    <div class="form-group">
        <label for="location">Локация</label>
        <input type="text" id="location" placeholder="Например, Strahov" required>
    </div>
    <div class="form-group">
        <label for="max_players">Кол-во мест</label>
        <input type="number" id="max_players" value="15" min="5" max="30" inputmode="numeric">
    </div>
    <button id="submitBtn" onclick="createGame()">Опубликовать</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Signal that WebApp is ready
        tg.expand();

        // DEBUG: Check initData
        if (!tg.initData) {
            // Local Debug Mode check
            // We can't easily check backend DEBUG flag here, but we can warn.
            // But if backend allows empty initData, we should proceed.
            // Let's rely on fetch returning 403 if it fails.
            console.log("No initData found. Assuming Local Debug Mode or Error.");
        } else {
            // alert("Debug: initData found. Length: " + tg.initData.length);
        }

        // Initialize elements
        const chatSelect = document.getElementById('chat_id');
        const dateTimeInput = document.getElementById('date_time');
        const locationInput = document.getElementById('location');
        const maxPlayersInput = document.getElementById('max_players');

        // 1. Fetch Chats
        async function loadChats() {
            // DEBUG: Show initData status
            if (!tg.initData) {
                chatSelect.innerHTML = '<option value="" disabled>ERROR: No InitData (Are you in Telegram?)</option>';
                // Also create a visible error
                const debugDiv = document.createElement('div');
                debugDiv.style.color = 'red';
                debugDiv.style.padding = '10px';
                debugDiv.innerText = "Debug: tg.initData is EMPTY. Platform: " + (tg.platform || 'unknown');
                document.body.prepend(debugDiv);
                return;
            }

            try {
                const response = await fetch('/api/chats?initData=' + encodeURIComponent(tg.initData));
                if (response.ok) {
                    const chats = await response.json();
                    chatSelect.innerHTML = '<option value="" disabled selected>Выберите чат</option>';
                    if (chats.length === 0) {
                        const option = document.createElement('option');
                        option.text = "Нет доступных чатов (добавьте бота в админы)";
                        option.disabled = true;
                        chatSelect.add(option);
                    } else {
                        chats.forEach(chat => {
                            const option = document.createElement('option');
                            option.value = chat.id;
                            option.text = chat.title;
                            chatSelect.add(option);
                        });
                    }
                } else {
                    console.error("Failed to fetch chats");
                    chatSelect.innerHTML = '<option value="" disabled>Ошибка загрузки чатов</option>';
                }
            } catch (e) {
                console.error(e);
                chatSelect.innerHTML = `<option value="" disabled>Ошибка сети: ${e.message}</option>`;
            }
        }

        // 2. Set Default Time (Prague/CET) and Init Flatpickr
        function initDatePicker() {
            const now = new Date();
            now.setHours(now.getHours() + 1);
            now.setMinutes(0);

            flatpickr("#date_time", {
                enableTime: true,
                dateFormat: "Y-m-dTH:i", // ISO format for backend
                altInput: true,
                altFormat: "d.m.Y H:i", // European display format
                defaultDate: now,
                time_24hr: true,
                locale: "ru", // Or "cs" for Czech
                minDate: "today"
            });
        }

        // Initialize
        loadChats();
        initDatePicker();

        // 3. Create Game
        async function createGame() {
            const chatId = chatSelect.value;
            const dateTime = dateTimeInput.value;
            const location = locationInput.value;
            const maxPlayers = maxPlayersInput.value;

            if (!chatId || !dateTime || !location) {
                tg.showAlert("Заполните все поля!");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Публикация...";

            try {
                const response = await fetch('/api/create_game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: parseInt(chatId),
                        date_time: new Date(dateTime).toISOString(),
                        location: location,
                        max_players: parseInt(maxPlayers),
                        initData: tg.initData
                    })
                });

                if (response.ok) {
                    tg.showAlert("Игра создана!");
                    tg.close();
                } else {
                    const error = await response.json();
                    tg.showAlert("Ошибка: " + (error.detail || "Unknown error"));
                }
            } catch (e) {
                tg.showAlert("Ошибка сети: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Опубликовать";
            }
        }
    </script>
</body>

</html>
