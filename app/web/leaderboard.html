<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Лидерборд</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/web/css/style.css?v=1.1.0">
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="group-header" class="flex-between" style="display:none; position:sticky; top:0; background:rgba(15,23,42,0.8); backdrop-filter:blur(10px); padding:12px 16px; border-bottom:1px solid var(--border-color); z-index:100;">
        <div class="flex-row">
            <div style="width:8px; height:8px; background:var(--accent-color); border-radius:50%"></div>
            <span id="group-name-display" style="font-weight:600; font-size:14px; opacity:0.8"></span>
        </div>
        <button onclick="showGroupSelector()" style="background:none; border:none; color:var(--accent-color); font-size:12px; font-weight:600; cursor:pointer">Сменить</button>
    </div>

    <div id="group-selector">
        <h2 style="margin-bottom: 24px;">Выберите группу</h2>
        <div id="group-list"></div>
    </div>

    <div class="page-container">
        <div id="page-profile" style="display:none;"></div>
        <div id="page-leaderboard" style="display:none;"></div>
        <div id="page-history" style="display:none;"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item" onclick="switchTab('profile')">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Профиль
        </a>
        <a href="#" class="nav-item" onclick="switchTab('history')">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            История
        </a>
        <a href="#" class="nav-item" onclick="switchTab('leaderboard')">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h2v5zm4 0h-2v-3h2v3zm-8 0H6v-2h2v2z"/></svg>
            Топ
        </a>
    </nav>

    <script src="/web/js/app.js?v=2.1.0"></script>
</body>
</html>
