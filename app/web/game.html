<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запись на игру</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/web/css/style.css?v=1.3.0">
    <style>
        .game-header-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border-bottom: 2px solid var(--accent-color);
            position: relative;
            overflow: hidden;
        }
        .game-header-card::after {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .meta-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .meta-label {
            font-size: 11px;
            color: var(--hint-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }
        .meta-val {
            font-weight: 700;
            color: var(--text-color);
        }
        .player-row {
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        .player-row.current-user {
            background: rgba(56, 189, 248, 0.08);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.05);
        }
        .player-rank {
            font-weight: 700;
            font-size: 13px;
            color: var(--hint-color);
            width: 24px;
            text-align: center;
        }
        .player-row.current-user .player-rank {
            color: var(--accent-color);
        }
        .player-pos-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--hint-color);
            text-transform: uppercase;
        }
        .player-rating {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent-color);
        }
        .action-container {
            padding: 16px;
            position: sticky;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .btn-join {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-join:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn-leave {
            width: 100%;
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ef4444;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-leave:active {
            transform: scale(0.98);
            background: rgba(244, 67, 54, 0.25);
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin: 24px 16px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-count {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--hint-color);
            padding: 2px 8px;
            border-radius: 20px;
        }
        /* Achievements Styling */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 24px;
        }
        .achievement-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }
        .achievement-card.unlocked {
            opacity: 1;
            border-color: rgba(56, 189, 248, 0.3);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(56, 189, 248, 0.05));
        }
        .achievement-icon {
            font-size: 24px;
        }
        .achievement-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-color);
        }
        .achievement-desc {
            font-size: 10px;
            color: var(--hint-color);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Sponsor Banner Top -->
    <div id="ad-banner-top" style="display:none; margin: 12px 16px 0;"></div>

    <!-- Game Card -->
    <div class="card game-header-card" style="margin-top: 16px; margin-bottom: 12px;">
        <div class="flex-between">
            <span style="font-size: 10px; font-weight: 800; color:var(--accent-color); text-transform: uppercase; letter-spacing: 1px;" id="game-label">Матч #--</span>
            <span id="game-status-badge" class="player-pos-badge" style="background:rgba(56, 189, 248, 0.15); color:var(--accent-color)">ОТКРЫТ</span>
        </div>
        <h2 style="padding: 12px 0 4px; font-size: 24px; line-height: 1.2;" id="game-location">📍 Загрузка...</h2>
        <div class="subtitle" id="game-date" style="font-size: 14px; font-weight: 500;">📅 --.--.---- --:--</div>

        <div class="meta-grid">
            <div class="meta-item">
                <span class="meta-label">Формат</span>
                <span class="meta-val" id="game-format">--х--</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Взнос</span>
                <span class="meta-val" id="game-price">-- CZK</span>
            </div>
            <div class="meta-item" style="grid-column: span 2;">
                <span class="meta-label">Реквизиты</span>
                <span class="meta-val" id="game-payment" style="font-size: 12px;">Загрузка...</span>
            </div>
        </div>
    </div>

    <!-- User Roster Position Window (GK Reserve Warning etc.) -->
    <div id="status-info-card" class="card" style="display:none; margin: 0 16px 16px; padding: 14px 18px; background: rgba(56,189,248,0.05); border-color: rgba(56,189,248,0.2);">
        <div class="flex-row" style="gap:10px;">
            <span style="font-size: 20px;">🛡️</span>
            <div>
                <div style="font-weight:700; font-size:13px; color:var(--accent-color);" id="status-info-title">Статус бронирования</div>
                <div style="font-size:12px; color:var(--hint-color); margin-top:2px;" id="status-info-desc"></div>
            </div>
        </div>
    </div>

    <!-- Achievements Section -->
    <div class="section-title">
        <span>Личные Достижения</span>
    </div>
    <div class="achievement-grid">
        <div class="achievement-card" id="ach-veteran">
            <div class="achievement-icon" id="ach-veteran-icon">⚔️</div>
            <div>
                <div class="achievement-title" id="ach-veteran-title">Ветеран</div>
                <div class="achievement-desc" id="ach-veteran-desc">0 игр сыграно</div>
            </div>
        </div>
        <div class="achievement-card" id="ach-goleador">
            <div class="achievement-icon" id="ach-goleador-icon">🥅</div>
            <div>
                <div class="achievement-title" id="ach-goleador-title">Бомбардир</div>
                <div class="achievement-desc" id="ach-goleador-desc">0 голов забито</div>
            </div>
        </div>
        <div class="achievement-card" id="ach-mvp">
            <div class="achievement-icon" id="ach-mvp-icon">🌟</div>
            <div>
                <div class="achievement-title" id="ach-mvp-title">MVP Матча</div>
                <div class="achievement-desc" id="ach-mvp-desc">0 званий MVP</div>
            </div>
        </div>
        <div class="achievement-card" id="ach-rating">
            <div class="achievement-icon" id="ach-rating-icon">👑</div>
            <div>
                <div class="achievement-title" id="ach-rating-title">Ранг MMR</div>
                <div class="achievement-desc" id="ach-rating-desc">Набирай силу</div>
            </div>
        </div>
    </div>

    <!-- Main Roster -->
    <div class="section-title">
        <span>Основной Состав</span>
        <span class="section-count" id="active-count">0 / --</span>
    </div>
    <div id="roster-active" style="padding: 0 16px;"></div>

    <!-- Reserve Roster -->
    <div class="section-title" id="reserve-header" style="display:none;">
        <span>Лист Резерва</span>
        <span class="section-count" id="reserve-count">0</span>
    </div>
    <div id="roster-reserve" style="padding: 0 16px; margin-bottom: 24px;"></div>

    <!-- Sponsor Banner Bottom -->
    <div id="ad-banner-bottom" style="display:none; margin: 16px 16px 24px;"></div>

    <!-- Sticky action footer -->
    <div class="action-container">
        <button class="btn-join" id="action-btn">
            <span>⚽ Записаться на игру</span>
        </button>
        <button class="btn-leave" id="leave-btn" style="display:none;">
            <span>❌ Выписаться с игры</span>
        </button>
        <button onclick="window.Telegram.WebApp.close()" class="pos-btn" style="width:100%; margin-top:10px; background:transparent; border:none; color:var(--hint-color); font-weight:600; font-size:12px;">
            🔙 Назад в чат группы
        </button>
    </div>

    <script src="/web/js/game.js?v=1.3.0"></script>
</body>
</html>
