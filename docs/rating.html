<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM Rating Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #5b8cfa;
      --accent2: #7b5cfa;
      --gold: #f5c842;
      --silver: #9ba3b8;
      --bronze: #c87941;
      --green: #3ecf75;
      --red: #f04949;
      --draw: #f5a623;
      --text: #e8eaf2;
      --text-dim: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ─── HEADER ─── */
    .header {
      text-align: center;
      padding: 32px 0 40px;
      position: relative;
    }

    .header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-dim);
      margin-top: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(91, 140, 250, 0.12);
      border: 1px solid rgba(91, 140, 250, 0.25);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--accent);
      margin-top: 14px;
    }

    /* ─── LEGENDS ─── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ─── FILTERS ─── */
    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── TOP 3 PODIUM ─── */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 40px;
    }

    .podium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 16px 18px;
      text-align: center;
      position: relative;
      transition: transform 0.2s;
      min-width: 130px;
    }

    .podium-card:hover {
      transform: translateY(-4px);
    }

    .podium-card.p1 {
      border-color: rgba(245, 200, 66, 0.45);
      background: linear-gradient(160deg, #1f1d0e 0%, #13161d 60%);
      transform: translateY(-16px);
      min-width: 160px;
      padding: 24px 20px 22px;
    }

    .podium-card.p1:hover {
      transform: translateY(-22px);
    }

    .podium-card.p2 {
      border-color: rgba(155, 163, 184, 0.35);
    }

    .podium-card.p3 {
      border-color: rgba(200, 121, 65, 0.35);
    }

    .podium-crown {
      font-size: 28px;
      line-height: 1;
    }

    .podium-rank {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 6px 0 10px;
    }

    .p1 .podium-rank {
      color: var(--gold);
    }

    .p2 .podium-rank {
      color: var(--silver);
    }

    .p3 .podium-rank {
      color: var(--bronze);
    }

    .podium-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      border: 3px solid transparent;
    }

    .p1 .podium-avatar {
      width: 80px;
      height: 80px;
      font-size: 30px;
      border-color: var(--gold);
    }

    .p2 .podium-avatar {
      border-color: var(--silver);
    }

    .p3 .podium-avatar {
      border-color: var(--bronze);
    }

    .podium-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .p1 .podium-name {
      font-size: 16px;
    }

    .podium-pos {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .podium-elo {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .p1 .podium-elo {
      font-size: 30px;
    }

    .podium-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: -2px;
    }

    /* ─── TABLE ─── */
    .table-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 8px 12px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }

    thead th {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    thead th.center {
      text-align: center;
    }

    tbody tr {
      background: var(--surface);
      border-radius: 12px;
      transition: background 0.15s;
      cursor: default;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    tbody tr.top3 {
      background: linear-gradient(90deg, rgba(91, 140, 250, 0.07) 0%, var(--surface) 60%);
    }

    tbody tr.top3:hover {
      background: linear-gradient(90deg, rgba(91, 140, 250, 0.14) 0%, var(--surface2) 60%);
    }

    td {
      padding: 13px 14px;
      font-size: 14px;
      vertical-align: middle;
    }

    td:first-child {
      border-radius: 12px 0 0 12px;
    }

    td:last-child {
      border-radius: 0 12px 12px 0;
    }

    .rank-cell {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      width: 36px;
    }

    .rank-1 {
      color: var(--gold);
    }

    .rank-2 {
      color: var(--silver);
    }

    .rank-3 {
      color: var(--bronze);
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .player-name {
      font-weight: 600;
      font-size: 14px;
    }

    .player-pos {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .elo-cell {
      font-weight: 900;
      font-size: 18px;
      color: var(--accent);
      text-align: center;
    }

    .stat-cell {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }

    .winpct-cell {
      text-align: center;
    }

    .winpct-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .winpct-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }

    .games-cell {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .game-dot {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
    }

    .dot-w {
      background: rgba(62, 207, 117, 0.2);
      color: var(--green);
      border: 1px solid rgba(62, 207, 117, 0.3);
    }

    .dot-l {
      background: rgba(240, 73, 73, 0.15);
      color: var(--red);
      border: 1px solid rgba(240, 73, 73, 0.2);
    }

    .dot-d {
      background: rgba(245, 166, 35, 0.15);
      color: var(--draw);
      border: 1px solid rgba(245, 166, 35, 0.2);
    }

    .mvp-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(245, 200, 66, 0.12);
      border: 1px solid rgba(245, 200, 66, 0.3);
      border-radius: 99px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(91, 140, 250, 0.1);
      color: var(--accent);
      border: 1px solid rgba(91, 140, 250, 0.2);
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 50px;
      opacity: 0.5;
    }

    /* mobile */
    @media (max-width: 700px) {
      .hide-mobile {
        display: none;
      }

      .podium {
        gap: 8px;
      }

      .podium-card {
        min-width: 100px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>⚽ FM Rating Board</h1>
    <p>Football Manager Prague · 2026 Season</p>
    <div class="badge">🏆 8 игр · 40+ игроков · обновлено 10.03.2026</div>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:var(--green)"></span>Победа (+10)</span>
    <span><span class="dot" style="background:var(--draw)"></span>Ничья (0)</span>
    <span><span class="dot" style="background:var(--red)"></span>Поражение (-5)</span>
    <span><span class="dot" style="background:var(--gold)"></span>MVP (+5)</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filter('all')">Все</button>
    <button class="filter-btn" onclick="filter('ВРТ')">🧤 Вратари</button>
    <button class="filter-btn" onclick="filter('ЗАЩ')">🛡️ Защита</button>

  <!-- TABLE -->

          <th class="center hide-mobile">MVP</th>
          <th class="center">История</th>

      <tbody id="tbody"></tbody>

  <footer>FM Bot · Prague · 2026</footer>

  <script>
    const PLAYERS = [

      ["АТК", "Yeldos Ismailov", "RW", 95, 4, 2, 1, 0, 3, 0, ["L", "L", "", "", "", "", "L", "W"]],
      ["АТК", "Mansur Mutayev", "FWD", 90, 2, 5, 0, 0, 2, 0, ["", "", "L", "L", "", "", "", ""]],
      ["ЗАЩ", "Yermakhan Borankhan", "RB", 90, 6, 0, 1, 1, 4, 0, ["", "L", "W", "L", "L", "D", "", "L"]],
    ];

    // Sort by ELO desc
    PLAYERS.sort((a, b) => b[3] - a[3]);

    const GRP_EMOJI = { "ВРТ": "🧤", "ЗАЩ": "🛡️", "МИД": "⚙️", "АТК": "⚡" };
    const AVATAR_COLORS = [
      ["#5b8cfa", "#7b5cfa"], ["#fa5b8c", "#fa7b5c"], ["#5bfa8c", "#5cfab7"],
      ["#fa8c5b", "#fac15c"], ["#8c5bfa", "#5b8cfa"], ["#5bfafa", "#5c8cfa"],
      ["#fa5bfa", "#fa5b8c"], ["#fafa5b", "#fa8c5b"],
    ];

    function initials(name) {
      return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function renderPodium(players) {
      const top = players.slice(0, 3);
      const ORDER = [1, 0, 2]; // visual: 2nd, 1st, 3rd
      const CROWNS = ["🥇", "🥈", "🥉"];
      const CLASSES = ["p2", "p1", "p3"];
      const LABELS = ["2-е место", "1-е место", "3-е место"];
      const REAL_RANK = [1, 0, 2]; // which player index to show at which visual position

      const podium = document.getElementById('podium');
      ORDER.forEach((pIdx, vIdx) => {
        const p = top[pIdx];
        const [c1, c2] = AVATAR_COLORS[pIdx % AVATAR_COLORS.length];
        const card = document.createElement('div');
        card.className = `podium-card ${CLASSES[vIdx]}`;
        card.innerHTML = `
      <div class="podium-crown">${CROWNS[pIdx]}</div>
      <div class="podium-rank">${LABELS[vIdx]}</div>
      <div class="podium-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${initials(p[1])}</div>
      <div class="podium-name">${p[1].split(' ')[0]}<br><small style="font-weight:400;font-size:12px;color:var(--text-dim)">${p[1].split(' ').slice(1).join(' ')}</small></div>
      <div class="podium-pos">${GRP_EMOJI[p[0]]} ${p[2]}</div>
      <div class="podium-elo">${p[3]}</div>
      <div class="podium-label">ELO</div>
    `;
        podium.appendChild(card);
      });
    }

    function renderTable(players) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      players.forEach((p, i) => {
        const globalRank = PLAYERS.indexOf(p) + 1;
        const [c1, c2] = AVATAR_COLORS[globalRank % AVATAR_COLORS.length];
        const [grp, name, pos, elo, gp, goals, w, d, l, mvp, history] = p;
        const total = w + d + l;
        const pct = total > 0 ? Math.round(w / total * 100) : 0;

        const rankCls = globalRank === 1 ? 'rank-1' : globalRank === 2 ? 'rank-2' : globalRank === 3 ? 'rank-3' : '';
        const rowCls = globalRank <= 3 ? 'top3' : '';

        const gameDots = history.map(r => {
          if (!r) return '';
          const cls = r === 'W' ? 'dot-w' : r === 'L' ? 'dot-l' : 'dot-d';
          return `<span class="game-dot ${cls}">${r}</span>`;
        }).join('');

        const mvpBadge = mvp > 0 ? `<span class="mvp-badge">⭐ ${mvp}</span>` : '';

        tbody.innerHTML += `
      <tr class="${rowCls}" data-grp="${grp}">
        <td class="rank-cell ${rankCls}">${globalRank}</td>
        <td>
          <div class="player-cell">
            <div class="avatar" style="background:linear-gradient(135deg,${c1},${c2})">${initials(name)}</div>
            <div>
              <div class="player-name">${name}</div>
              <div class="player-pos">${GRP_EMOJI[grp]} ${pos}</div>
            </div>
          </div>
        </td>
        <td class="elo-cell">${elo}</td>
        <td class="stat-cell hide-mobile">${gp}</td>
        <td class="stat-cell hide-mobile">${goals > 0 ? '⚽ ' + goals : '—'}</td>
        <td class="winpct-cell">
          <div style="font-size:13px;font-weight:700;color:${pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--draw)' : 'var(--red)'}">${pct}%</div>
          <div class="winpct-bar"><div class="winpct-fill" style="width:${pct}%"></div></div>
        </td>
        <td class="stat-cell hide-mobile">
          <span style="color:var(--green)">${w}W</span> /
          <span style="color:var(--draw)">${d}D</span> /
          <span style="color:var(--red)">${l}L</span>
        </td>
        <td class="stat-cell hide-mobile">${mvpBadge || '—'}</td>
        <td><div class="games-cell">${gameDots}</div></td>
      </tr>
    `;
      });
    }

    function filter(grp) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      const filtered = grp === 'all' ? PLAYERS : PLAYERS.filter(p => p[0] === grp);
      renderTable(filtered);
    }

    // Init
    renderPodium(PLAYERS);
    renderTable(PLAYERS);
  </script>
</body>

</html>
