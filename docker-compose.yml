

services:
  app:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app:z

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Prague
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    external: true
    name: football-prod_postgres_data
  redis_data:
    external: true
    name: football-prod_redis_data
