

services:
  app:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
      - worker
    command: uv run --no-sync uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --workers 4
    # Entrypoint is now defined in the Dockerfile
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUN_MIGRATIONS=False
      - RUN_SCHEDULER=False
      - RUN_CONSUMER=False
      - RUN_BOT=False

  worker:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uv run --no-sync python app/worker.py
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  staging-app:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    ports:
      - "${STAGING_PORT:-8001}:8000"
    depends_on:
      - db
      - redis
    command: sh -c "uv run --no-sync alembic upgrade head && uv run --no-sync uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      - BOT_TOKEN=7652258054:AAGHBJf9rTMfLP9UCnad6zprZJYeGSF8caM
      - BOT_USERNAME=footballManagerTestbot
      - USE_POLLING=True
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.40
    command: --interval 300 --cleanup

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Prague
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    external: true
    name: football-prod_postgres_data
  redis_data:
    external: true
    name: football-prod_redis_data
