services:
  app:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUN_MIGRATIONS=False
      - RUN_SCHEDULER=False
      - RUN_CONSUMER=False
      - RUN_BOT=False

  worker:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python app/worker.py
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  staging-app:
    image: ${GHCR_IMAGE:-ghcr.io/yeronymus/football-manager:latest}
    restart: always
    env_file:
      - .env
    ports:
      - "${STAGING_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      - BOT_TOKEN=${STAGING_BOT_TOKEN:-}
      - BOT_USERNAME=${STAGING_BOT_USERNAME:-footballManagerTestbot}
      - USE_POLLING=True
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.40
    command: --interval 300 --cleanup

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Prague
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

volumes:
  postgres_data:
    external: true
    name: football-prod_postgres_data
  redis_data:
    external: true
    name: football-prod_redis_data


